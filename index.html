<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptVault — AI 提示词管理专家</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🧠</span>
      <h1 class="app-title">PromptVault</h1>
      <span class="app-subtitle">AI 提示词管理专家</span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜索提示词..." />
      </div>
      <button class="btn btn-primary" id="addPromptBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
        新建提示词
      </button>
      <button class="btn btn-icon" id="themeToggle" title="切换主题">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="category-nav">
        <h3 class="sidebar-title">分类</h3>
        <ul class="category-list" id="categoryList">
          <li class="category-item active" data-category="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            全部
            <span class="category-count" id="countAll">0</span>
          </li>
          <li class="category-item" data-category="writing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            写作
            <span class="category-count" id="countWriting">0</span>
          </li>
          <li class="category-item" data-category="coding">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            编程
            <span class="category-count" id="countCoding">0</span>
          </li>
          <li class="category-item" data-category="marketing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            营销
            <span class="category-count" id="countMarketing">0</span>
          </li>
          <li class="category-item" data-category="translation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            翻译
            <span class="category-count" id="countTranslation">0</span>
          </li>
          <li class="category-item" data-category="business">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            商务
            <span class="category-count" id="countBusiness">0</span>
          </li>
          <li class="category-item" data-category="image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            AI绘画
            <span class="category-count" id="countImage">0</span>
          </li>
          <li class="category-item" data-category="other">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            其他
            <span class="category-count" id="countOther">0</span>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-ghost" id="exportBtn">📤 导出数据</button>
        <button class="btn btn-ghost" id="importBtn">📥 导入数据</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-number" id="totalPrompts">0</span>
          <span class="stat-label">总提示词</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalFavorites">0</span>
          <span class="stat-label">已收藏</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalCopied">0</span>
          <span class="stat-label">总复制次数</span>
        </div>
      </div>

      <!-- Filter Tags -->
      <div class="filter-bar">
        <span class="filter-label">标签筛选：</span>
        <div class="tag-filters" id="tagFilters">
          <span class="tag-filter active" data-tag="all">全部</span>
        </div>
      </div>

      <!-- Prompt Cards Grid -->
      <div class="prompt-grid" id="promptGrid">
        <!-- Cards will be rendered here -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🧠</div>
        <h3>还没有提示词</h3>
        <p>点击右上角「新建提示词」开始你的 AI 提示词管理之旅</p>
      </div>
    </main>
  </div>

  <!-- Modal: Add/Edit Prompt -->
  <div class="modal-overlay" id="promptModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新建提示词</h2>
        <button class="btn btn-icon modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>标题 <span class="required">*</span></label>
          <input type="text" id="promptTitle" placeholder="给你的提示词起个名字" maxlength="50" />
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="promptCategory">
            <option value="writing">写作</option>
            <option value="coding">编程</option>
            <option value="marketing">营销</option>
            <option value="translation">翻译</option>
            <option value="business">商务</option>
            <option value="image">AI绘画</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>提示词内容 <span class="required">*</span></label>
          <textarea id="promptContent" rows="8" placeholder="输入你的提示词内容...&#10;&#10;💡 使用 {{变量名}} 创建可填充的变量模板&#10;例如：请将以下{{语言}}文本翻译成{{目标语言}}：{{文本内容}}"></textarea>
          <div class="variable-hint" id="variableHint" style="display:none">
            <span class="hint-icon">💡</span>
            <span>检测到变量：</span>
            <span id="detectedVars"></span>
          </div>
        </div>
        <div class="form-group">
          <label>标签</label>
          <input type="text" id="promptTags" placeholder="用逗号分隔多个标签，如：翻译,英语,商务" />
        </div>
        <div class="form-group">
          <label>备注（可选）</label>
          <input type="text" id="promptNote" placeholder="使用场景、注意事项等" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalSave">保存</button>
      </div>
    </div>
  </div>

  <!-- Modal: Use Template -->
  <div class="modal-overlay" id="templateModal">
    <div class="modal">
      <div class="modal-header">
        <h2>填充模板变量</h2>
        <button class="btn btn-icon modal-close" id="templateModalClose">&times;</button>
      </div>
      <div class="modal-body" id="templateFields">
        <!-- Dynamic fields will be rendered here -->
      </div>
      <div class="modal-footer">
        <div class="template-preview-toggle">
          <button class="btn btn-ghost" id="previewTemplateBtn">👁 预览</button>
        </div>
        <button class="btn btn-ghost" id="templateCancel">取消</button>
        <button class="btn btn-primary" id="templateCopy">复制生成的提示词</button>
      </div>
      <div class="template-preview" id="templatePreview" style="display:none">
        <h4>预览结果：</h4>
        <pre id="previewContent"></pre>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
